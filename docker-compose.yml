services:
  # ── Database ──────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: phiacta
      POSTGRES_USER: phiacta
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phiacta -d phiacta"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Forgejo (git backend) ───────────────────────────────
  forgejo:
    image: codeberg.org/forgejo/forgejo:10
    environment:
      FORGEJO__database__DB_TYPE: sqlite3
      FORGEJO__server__ROOT_URL: http://forgejo:3000
      FORGEJO__server__HTTP_PORT: "3000"
      FORGEJO__service__DISABLE_REGISTRATION: "false"
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO_ADMIN_USER: phiacta-admin
      FORGEJO_ADMIN_PASSWORD: phiacta-dev-password
      FORGEJO_ADMIN_EMAIL: admin@phiacta.local
      FORGEJO_ORG: phiacta
    ports:
      - "${FORGEJO_PORT:-3000}:3000"
    volumes:
      - forgejo_data:/data
      - ${BACKEND_PATH:-../phiacta}/docker/forgejo-entrypoint.sh:/forgejo-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/forgejo-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/version"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend API ───────────────────────────────────────────
  backend:
    build:
      context: ${BACKEND_PATH:-../phiacta}
      dockerfile: Dockerfile
      target: development
    environment:
      DATABASE_URL: "postgresql+asyncpg://phiacta:devpassword@db:5432/phiacta"
      JWT_SECRET_KEY: "dev-secret-not-for-production-use-only"
      LOG_LEVEL: "debug"
      ENVIRONMENT: "development"
      CORS_ORIGINS: '["http://localhost:3001","http://localhost:3003","http://100.64.0.1:3003"]'
      FORGEJO_URL: "http://forgejo:3000"
      FORGEJO_ADMIN_USER: "phiacta-admin"
      FORGEJO_ADMIN_PASSWORD: "phiacta-dev-password"
      FORGEJO_ORG: "phiacta"
      FORGEJO_WEBHOOK_SECRET: "dev-webhook-secret-not-for-production"
      ENABLED_PLUGINS: '["tags", "search_tsv", "search"]'
    ports:
      - "8000:8000"
    volumes:
      - ${BACKEND_PATH:-../phiacta}/src:/app/src
      - ${BACKEND_PATH:-../phiacta}/extensions:/app/extensions
    depends_on:
      db:
        condition: service_healthy
      forgejo:
        condition: service_healthy
    command: >
      uvicorn phiacta.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/src

  # ── Web Frontend ──────────────────────────────────────────
  web:
    build:
      context: ${WEB_PATH:-../phiacta-web}
      dockerfile: Dockerfile
      target: development
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8000}"
      API_URL_INTERNAL: "http://backend:8000"
    ports:
      - "${WEB_PORT:-3001}:3000"
    volumes:
      - ${WEB_PATH:-../phiacta-web}/src:/app/src
      - ${WEB_PATH:-../phiacta-web}/public:/app/public
    depends_on:
      - backend

  # ── Debug Tools ───────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    profiles: ["debug"]
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@phiacta.local
      PGADMIN_DEFAULT_PASSWORD: devpassword
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata:
  forgejo_data:
