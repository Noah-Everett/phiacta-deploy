name: phiacta-prod

services:
  # ── Database ──────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: phiacta
      POSTGRES_USER: phiacta
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - /Volumes/SSD/phiacta/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phiacta -d phiacta"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Forgejo (git backend) ─────────────────────────────────
  forgejo:
    image: codeberg.org/forgejo/forgejo:10
    environment:
      FORGEJO__database__DB_TYPE: sqlite3
      FORGEJO__server__ROOT_URL: http://forgejo:3000
      FORGEJO__server__HTTP_PORT: "3000"
      FORGEJO__service__DISABLE_REGISTRATION: "true"
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__webhook__ALLOWED_HOST_LIST: "*"
      FORGEJO__queue__BATCH_LENGTH: "1"
      FORGEJO_ADMIN_USER: phiacta-admin
      FORGEJO_ADMIN_PASSWORD: "${FORGEJO_ADMIN_PASSWORD}"
      FORGEJO_ADMIN_EMAIL: admin@phiacta.local
      FORGEJO_ORG: phiacta
    volumes:
      - /Volumes/SSD/phiacta/data/forgejo:/data
      - ../phiacta/docker/forgejo-entrypoint.sh:/forgejo-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/forgejo-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/version"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Backend API ───────────────────────────────────────────
  backend:
    build:
      context: ../phiacta
      dockerfile: docker/Dockerfile
      target: production
    environment:
      DATABASE_URL: "postgresql+asyncpg://phiacta:${POSTGRES_PASSWORD}@db:5432/phiacta"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      ENVIRONMENT: "production"
      LOG_LEVEL: "info"
      LOG_FORMAT: "json"
      CORS_ORIGINS: '["https://phiacta.com"]'
      FORGEJO_URL: "http://forgejo:3000"
      FORGEJO_ADMIN_USER: "phiacta-admin"
      FORGEJO_ADMIN_PASSWORD: "${FORGEJO_ADMIN_PASSWORD}"
      FORGEJO_ORG: "phiacta"
      FORGEJO_WEBHOOK_SECRET: "${FORGEJO_WEBHOOK_SECRET}"
      ENABLED_PLUGINS: '["metadata", "types", "references", "tags", "search_tsv", "search"]'
    depends_on:
      db:
        condition: service_healthy
      forgejo:
        condition: service_healthy
    restart: unless-stopped

  # ── Web Frontend ──────────────────────────────────────────
  web:
    build:
      context: ../phiacta-web
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: "https://api.phiacta.com"
    environment:
      API_URL_INTERNAL: "http://backend:8000"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Cloudflare Tunnel ─────────────────────────────────────
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      - web
      - backend
    restart: unless-stopped

